<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Trivia</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold2:#e8c96a;--gold3:#f5df90;
  --gold-shine:linear-gradient(135deg,#c9a84c 0%,#f5df90 45%,#c9a84c 70%,#e2b84a 100%);
  --gold-dim:rgba(201,168,76,.12);--gold-glow:rgba(201,168,76,.35);
  --bg:#080808;--surface:rgba(10,10,10,.82);--surface2:rgba(15,15,15,.92);
  --text:#f0ede8;--text2:#b0a898;--text3:#5a5248;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --green:#2ecc71;--red:#e74c3c;
  --radius:10px;--radius-lg:16px;
  --display:'Bebas Neue',sans-serif;
  --cinzel:'Cinzel',serif;
  --serif:'EB Garamond',serif;
  --font:'DM Sans',sans-serif;
}
html,body{height:100%;width:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text)}

/* ── SETUP SCREEN ── */
#setup-screen{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;
  gap:0;
}
.setup-eyebrow{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--gold);letter-spacing:.06em;margin-bottom:6px;text-align:center}
.setup-title{font-family:var(--display);font-size:clamp(60px,10vw,110px);letter-spacing:.04em;line-height:.88;text-align:center;margin-bottom:0}
.setup-title span{background:var(--gold-shine);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.setup-sub{font-family:var(--serif);font-style:italic;font-size:clamp(16px,2.2vw,22px);color:var(--text2);text-align:center;margin-top:14px;margin-bottom:2rem}
.setup-rounds-label{font-family:var(--cinzel);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;text-align:center}
.setup-rounds-grid{
  display:flex;flex-direction:column;gap:8px;
  width:100%;max-width:420px;margin-bottom:1.5rem;
}
.setup-round-card{
  width:100%;
  background:rgba(255,255,255,.03);border:1px solid var(--border2);
  border-radius:var(--radius-lg);overflow:hidden;
  display:flex;align-items:center;gap:14px;padding:10px 14px;
}
.setup-round-card-thumb{
  width:72px;height:18px;object-fit:cover;display:block;
  background:var(--surface2);border-radius:3px;flex-shrink:0;
}
.setup-round-card-thumb-placeholder{
  width:72px;height:18px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.02));
  border-radius:3px;
}
.setup-round-card-body{flex:1;min-width:0}
.setup-round-num{font-family:var(--cinzel);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.setup-round-name{font-family:var(--cinzel);font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.setup-round-tab{font-size:11px;color:var(--text3);font-family:var(--serif);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.setup-launch-btn{
  width:100%;max-width:420px;
  padding:15px;font-family:var(--cinzel);font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  background:var(--gold-shine);color:#000;border:none;border-radius:var(--radius);
  cursor:pointer;transition:opacity .2s,transform .15s;
}
.setup-launch-btn:hover{opacity:.88;transform:translateY(-1px)}
.setup-launch-btn:active{transform:translateY(0)}
.setup-hint{font-family:var(--serif);font-style:italic;font-size:12px;color:var(--text3);text-align:center;margin-top:.75rem;width:100%;max-width:420px}

/* ── LOADING ── */
#loading-screen{
  position:fixed;inset:0;z-index:900;
  background:var(--bg);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;
}
#loading-screen.show{display:flex}
.loading-spinner{width:40px;height:40px;border:2px solid var(--gold-dim);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-label{font-family:var(--cinzel);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}

/* ── PRESENTATION SCREEN ── */
#pres-screen{
  position:fixed;inset:0;z-index:800;
  display:none;
}
#pres-screen.show{display:block}

/* Background layer */
#pres-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  transition:background-image .4s ease;
}
#pres-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.45) 0%, rgba(0,0,0,.2) 40%, rgba(0,0,0,.7) 100%);
}
/* fallback solid when no bg image */
#pres-bg.no-img{background:radial-gradient(ellipse at 30% 20%, #1a1200 0%, #080808 70%)}

/* ── SLIDE TYPES ── */
.slide{
  position:absolute;inset:0;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem 4rem;
  animation:slideIn .35s ease forwards;
}
.slide.active{display:flex}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* INTRO SLIDE */
.slide-intro{text-align:center}
.slide-intro .round-badge{
  font-family:var(--cinzel);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);background:var(--gold-dim);border:1px solid var(--gold-glow);
  border-radius:99px;padding:5px 18px;display:inline-block;margin-bottom:1.5rem;
}
.slide-intro .round-title{
  font-family:var(--display);font-size:clamp(60px,12vw,140px);
  line-height:.88;letter-spacing:.04em;color:var(--text);margin-bottom:1.2rem;
}
.slide-intro .round-title span{background:var(--gold-shine);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.slide-intro .round-sub{
  font-family:var(--serif);font-style:italic;font-size:clamp(18px,2.5vw,26px);
  color:var(--text2);margin-bottom:3rem;
}
.slide-intro .start-hint{
  font-family:var(--cinzel);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--text3);animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* QUESTION SLIDE */
.slide-question{justify-content:space-between;padding:2.5rem 3.5rem}
.q-header{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:auto}
.q-num-badge{
  font-family:var(--display);font-size:clamp(50px,7vw,80px);
  line-height:1;background:var(--gold-shine);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.q-round-label{
  font-family:var(--cinzel);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--text3);text-align:right;
}
.q-progress{display:flex;gap:5px;align-items:center;margin-top:4px}
.q-progress-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s}
.q-progress-dot.done{background:var(--gold)}
.q-progress-dot.current{background:var(--gold3);box-shadow:0 0 6px var(--gold-glow)}

.q-body{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;gap:1.5rem;padding:1.5rem 0;
}
.q-image-wrap{
  width:min(260px, 28vw);height:min(260px,28vw);
  border-radius:var(--radius-lg);overflow:hidden;
  border:1px solid var(--border2);
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  flex-shrink:0;
}
.q-image-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.q-text-block{text-align:center;max-width:820px}
.q-question{
  font-family:var(--cinzel);font-weight:600;
  font-size:clamp(22px,3.8vw,46px);
  line-height:1.22;letter-spacing:.02em;
  color:var(--text);
  text-shadow:0 2px 20px rgba(0,0,0,.8);
}

/* MC Options */
.mc-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  width:100%;max-width:760px;margin-top:.5rem;
}
.mc-opt{
  background:rgba(10,10,10,.65);
  border:1px solid var(--border2);border-radius:var(--radius);
  padding:12px 18px;display:flex;align-items:center;gap:12px;
  backdrop-filter:blur(8px);
}
.mc-opt-letter{
  font-family:var(--display);font-size:28px;
  background:var(--gold-shine);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  flex-shrink:0;line-height:1;
}
.mc-opt-text{font-family:var(--cinzel);font-size:clamp(13px,1.8vw,18px);letter-spacing:.04em;color:var(--text);line-height:1.3}

/* TF Options */
.tf-row{display:flex;gap:16px;margin-top:.5rem}
.tf-opt{
  flex:1;background:rgba(10,10,10,.65);border:1px solid var(--border2);
  border-radius:var(--radius);padding:14px 22px;text-align:center;
  backdrop-filter:blur(8px);
}
.tf-opt-text{font-family:var(--display);font-size:clamp(30px,5vw,60px);letter-spacing:.06em;color:var(--text)}

/* Audio button */
.audio-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--gold-dim);border:1px solid var(--gold-glow);
  border-radius:99px;padding:8px 20px;cursor:pointer;
  font-family:var(--cinzel);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);
  transition:all .2s;margin-top:.5rem;
}
.audio-btn:hover{background:rgba(201,168,76,.22)}
.audio-btn svg{width:16px;height:16px;fill:var(--gold)}

/* ANSWER OVERLAY */
.answer-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.72);backdrop-filter:blur(4px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;padding:3rem;
  animation:slideIn .3s ease forwards;
  pointer-events:none;
}
.answer-label{
  font-family:var(--cinzel);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);
}
.answer-text{
  font-family:var(--display);font-size:clamp(40px,7vw,90px);
  letter-spacing:.04em;text-align:center;
  background:var(--gold-shine);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;
  line-height:1.05;
}
.answer-next-hint{
  font-family:var(--cinzel);font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--text3);animation:pulse 2s ease-in-out infinite;margin-top:.5rem;
}

/* ANSWER KEY SLIDE */
.slide-answerkey{align-items:flex-start;justify-content:flex-start;padding:2.5rem 3.5rem;overflow-y:auto}
.ak-title{
  font-family:var(--display);font-size:clamp(36px,5vw,60px);letter-spacing:.06em;
  background:var(--gold-shine);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:1.5rem;flex-shrink:0;
}
.ak-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:6px 3rem;width:100%;
}
.ak-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 0;border-bottom:.5px solid rgba(255,255,255,.08);
}
.ak-num{
  font-family:var(--cinzel);font-size:13px;font-weight:700;
  color:#000;background:#c9a84c;
  border-radius:4px;padding:2px 7px;text-align:center;
  min-width:30px;flex-shrink:0;line-height:1.6;
}
.ak-a{
  font-family:var(--cinzel);font-size:clamp(16px,2vw,24px);
  color:var(--text);letter-spacing:.04em;line-height:1.2;
}

/* THANK YOU / NEXT ROUND SLIDE */
.slide-end{text-align:center}
.slide-end .end-label{
  font-family:var(--cinzel);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);margin-bottom:1.2rem;
}
.slide-end .end-title{
  font-family:var(--display);font-size:clamp(50px,10vw,120px);
  letter-spacing:.04em;line-height:.9;margin-bottom:1.5rem;
  background:var(--gold-shine);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.slide-end .end-sub{
  font-family:var(--serif);font-style:italic;font-size:clamp(16px,2.2vw,24px);
  color:var(--text2);margin-bottom:2.5rem;
}
.end-btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.end-btn{
  font-family:var(--cinzel);font-size:12px;letter-spacing:.12em;text-transform:uppercase;
  border-radius:var(--radius);padding:13px 28px;cursor:pointer;transition:all .2s;
}
.end-btn-primary{background:var(--gold-shine);color:#000;border:none;font-weight:600}
.end-btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.end-btn-ghost{background:transparent;color:var(--gold);border:1px solid var(--gold-glow)}
.end-btn-ghost:hover{background:var(--gold-dim)}

/* HUD */
#hud{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  z-index:850;display:none;
  background:rgba(8,8,8,.85);backdrop-filter:blur(12px);
  border:.5px solid var(--border2);border-radius:99px;
  padding:7px 18px;display:flex;align-items:center;gap:16px;
  font-family:var(--cinzel);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
}
#hud.show{display:flex}
.hud-item{color:var(--text3);display:flex;align-items:center;gap:5px}
.hud-item span{color:var(--text)}
.hud-sep{width:1px;height:12px;background:var(--border2)}
.hud-key{
  background:rgba(255,255,255,.06);border:1px solid var(--border2);
  border-radius:4px;padding:2px 6px;font-size:9px;color:var(--text2);
}

/* TOAST */
#toast{
  position:fixed;top:1.5rem;left:50%;transform:translateX(-50%) translateY(-10px);
  background:rgba(201,168,76,.15);border:1px solid var(--gold-glow);
  border-radius:99px;padding:8px 20px;
  font-family:var(--cinzel);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);
  opacity:0;transition:all .3s;z-index:999;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── TRANSITIONS ── */
.fade-out{animation:fadeOut .25s ease forwards}
@keyframes fadeOut{to{opacity:0}}

/* JUMP PANEL — shown during main round questions */
#jump-panel{
  position:fixed;top:1.5rem;right:1.5rem;z-index:860;
  display:none;flex-direction:column;gap:6px;
}
#jump-panel.show{display:flex}
.jump-btn{
  font-family:var(--cinzel);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  background:rgba(8,8,8,.85);backdrop-filter:blur(12px);
  border:1px solid var(--gold-glow);border-radius:var(--radius);
  color:var(--gold);padding:7px 14px;cursor:pointer;transition:all .2s;
  text-align:left;white-space:nowrap;
}
.jump-btn:hover{background:var(--gold-dim);border-color:var(--gold-glow2)}
.jump-panel-label{
  font-family:var(--cinzel);font-size:8px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text3);text-align:right;margin-bottom:2px;
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     SETUP SCREEN
══════════════════════════════════════════ -->
<div id="setup-screen">
  <div class="setup-eyebrow">Belladonna Audio Alchemies</div>
  <div class="setup-title">TRIVIA<br><span>NIGHT</span></div>
  <div class="setup-sub" id="setup-sub-text">Let's play some trivia.</div>
  <div class="setup-rounds-grid" id="setup-rounds-grid"></div>
  <button class="setup-launch-btn" id="setup-launch-btn" onclick="launchFromSetup()" style="display:none">Launch Trivia Night →</button>
  <button id="setup-return-btn" onclick="returnToPresentation()" style="display:none;width:100%;max-width:420px;margin-top:8px;padding:14px;font-family:var(--cinzel);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;background:var(--gold-shine);color:#000;border:none;border-radius:var(--radius);cursor:pointer">↩ Return to Presentation</button>
  <div class="setup-hint">Space to reveal · → next · ← back · A answer key · Esc exit</div>
</div>

<!-- ══════════════════════════════════════════
     LOADING
══════════════════════════════════════════ -->
<div id="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-label" id="loading-label">Loading questions…</div>
</div>

<!-- ══════════════════════════════════════════
     PRESENTATION
══════════════════════════════════════════ -->
<div id="pres-screen">
  <div id="pres-bg" class="no-img"></div>
  <div id="slide-container"></div>
</div>

<!-- FULLSCREEN BUTTON -->
<button id="fullscreen-btn" onclick="document.documentElement.requestFullscreen?.().catch(()=>{})" style="
  display:none;position:fixed;top:1rem;right:1rem;z-index:900;
  background:rgba(8,8,8,.8);backdrop-filter:blur(8px);
  border:1px solid rgba(201,168,76,.35);border-radius:8px;
  padding:7px 12px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:#c9a84c;transition:all .2s;
">⛶ Fullscreen</button>

<!-- JUMP PANEL -->
<div id="jump-panel">
  <div class="jump-panel-label">Jump to mini game</div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-item">Round <span id="hud-round">—</span></div>
  <div class="hud-sep"></div>
  <div class="hud-item">Q <span id="hud-q">—</span></div>
  <div class="hud-sep"></div>
  <div class="hud-item"><span class="hud-key">Space</span> reveal</div>
  <div class="hud-sep"></div>
  <div class="hud-item"><span class="hud-key">→</span> next</div>
  <div class="hud-sep"></div>
  <div class="hud-item"><span class="hud-key">J+1</span> jump</div>
  <div class="hud-sep"></div>
  <div class="hud-item"><span class="hud-key">Esc</span> exit</div>
</div>

<div id="toast"></div>

<audio id="audio-player" style="display:none"></audio>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG & STATE
// ═══════════════════════════════════════════════════════
const DIFF_EASY=1,DIFF_MEDIUM=2,DIFF_HARD=3;
const MC_LABELS=['A','B','C','D'];

const API_KEY = 'AIzaSyACMjXQCXjVo75hbMXtag_JctR4SoX70So';

// Populated from Firebase on load - used for Follow Us and Rules slides
var appSettings = {};
var catTypes = [];

// Load from Firebase non-blocking (best effort)
(function loadFirebaseData() {
  try {
    const fbConfig = {
      apiKey:"AIzaSyBHZekpX2HQOjI94EYJPSJS9Kew4gpTM0w",
      authDomain:"belladonnatrivia.firebaseapp.com",
      databaseURL:"https://belladonnatrivia-default-rtdb.firebaseio.com",
      projectId:"belladonnatrivia",
    };
    if(!firebase.apps.length) firebase.initializeApp(fbConfig);
    const db = firebase.database();
    db.ref('appSettings').once('value', s => { appSettings = s.val()||{}; });
    db.ref('categoryTypes').once('value', s => {
      const d = s.val()||{};
      catTypes = Object.entries(d).map(([id,v])=>({id,...v}));
    });
  } catch(e) { /* Firebase unavailable — Follow Us/Rules will show defaults */ }
})();

let state = {
  rounds: [],
  roundIndex: 0,
  slideIndex: 0,
  answerVisible: false,
  answerKeyVisible: false,
  currentType: null, // override for S_JUMP
  mainRoundIndex: -1,
  mainRoundSavedSlide: 0,
  jumpingFromMain: false,
};

// Slide types
const S_INTRO='intro', S_FOLLOWUS='followus', S_RULES='rules', S_QUESTION='question', S_INTERSTITIAL='interstitial', S_ANSWERKEY='answerkey', S_THANKYOU='thankyou', S_END='end', S_SLIDE='slide', S_JUMP='jump';

// ═══════════════════════════════════════════════════════
//  LAUNCH (manual fallback — normally launched from admin)
// ═══════════════════════════════════════════════════════
async function launchTrivia() {
  // no-op — trivia.html is always launched via URL params from admin
}

// ═══════════════════════════════════════════════════════
//  SHEET LOADING — ported from GAS script
// ═══════════════════════════════════════════════════════
async function loadSheetQuestions(sheetUrl, tabName, count) {
  const sheetId = extractSheetId(sheetUrl);
  if(!sheetId) throw new Error('Could not extract Sheet ID from URL.');

  // Fetch A:I (cols 1–9)
  const range = encodeURIComponent(`${tabName}!A2:I`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?key=${API_KEY}`;

  const res = await fetch(url);
  if(!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  const rows = (data.values || []).map(parseRow).filter(Boolean);
  if(!rows.length) throw new Error('No valid rows found.');
  return pickByDifficultySequence(rows, count);
}

// ═══════════════════════════════════════════════════════
//  SLIDESHOW LOADING — parses pasted URL list
// ═══════════════════════════════════════════════════════
function loadSlidesheetManifest(urlList) {
  const slides = urlList
    .split('\n')
    .map(u => u.trim())
    .filter(u => u.length > 0)
    .map((u, i) => ({ id: i, name: `Slide ${i+1}`, url: driveViewUrl(u) }));
  if(!slides.length) throw new Error('No image URLs found.');
  return slides;
}

function extractSheetId(ref) {
  const m = String(ref).match(/\/d\/([a-zA-Z0-9-_]+)/);
  return m ? m[1] : String(ref).trim();
}

function parseRow(r) {
  const q = safe(r[0]).trim();
  const a = safe(r[1]).trim();
  if(!q || !a) return null;

  const diff = Math.min(3, Math.max(1, parseInt(r[2])||DIFF_EASY));
  const img  = safe(r[3]).trim();
  const audio= safe(r[4]).trim();

  const mcOptions = [r[5],r[6],r[7],r[8]]
    .map(v=>safe(v).trim()).filter(v=>v.length>0);

  const au = a.toUpperCase();
  const type = (au==='TRUE'||au==='FALSE') ? 'tf'
             : mcOptions.length > 0 ? 'mc'
             : 'standard';

  return {question:q, answer:a, difficulty:diff, imageUrl:img, audioUrl:audio, type, mcOptions};
}

function pickByDifficultySequence(rows, n) {
  const pools = {
    [DIFF_EASY]:   shuffle(rows.filter(r=>r.difficulty===DIFF_EASY)),
    [DIFF_MEDIUM]: shuffle(rows.filter(r=>r.difficulty===DIFF_MEDIUM)),
    [DIFF_HARD]:   shuffle(rows.filter(r=>r.difficulty===DIFF_HARD)),
  };
  const usedIds = new Set();
  const sequence = [DIFF_EASY, DIFF_MEDIUM, DIFF_HARD];
  const chosen = [];

  for(let i=0; i<n; i++) {
    const diff = sequence[i % sequence.length];
    let row = pullUnused(pools[diff], usedIds);
    if(!row) {
      for(const fd of [DIFF_EASY,DIFF_MEDIUM,DIFF_HARD].filter(d=>d!==diff)) {
        row = pullUnused(pools[fd], usedIds);
        if(row) break;
      }
    }
    if(!row) break;
    usedIds.add(rowId(row));
    chosen.push(row);
  }
  return chosen;
}

function pullUnused(pool, usedIds) {
  for(const r of pool) { if(!usedIds.has(rowId(r))) return r; }
  return null;
}

function rowId(r) { return r.question+'|'+r.answer; }

// Shuffle MC options with correct answer inserted randomly
function buildMCChoices(row) {
  const wrongs = row.mcOptions.slice(0, 3); // up to 3 wrong options
  const all = shuffle([row.answer, ...wrongs]);
  return all.map((text, i) => ({label: MC_LABELS[i], text, correct: text===row.answer}));
}

// ═══════════════════════════════════════════════════════
//  SLIDE NAVIGATION
// ═══════════════════════════════════════════════════════
function currentRound() { return state.rounds[state.roundIndex]; }

// Follow Us + Rules only on round 1
const isFirstRound = () => state.roundIndex === 0;

// Is this the "thank you" round — main round if exists, else last round
function isThankyouRound() {
  if(state.mainRoundIndex >= 0) return state.roundIndex === state.mainRoundIndex;
  return state.roundIndex >= state.rounds.length - 1;
}

function slideCount() {
  const round = currentRound();
  const prefix = isFirstRound() ? 3 : 1; // intro + [followus + rules] on round 1 only

  if(round.type === 'slideshow') {
    return prefix + (round.slides||[]).length + 1;
  }
  const n = round.questions.length;
  const hasThankyou = !!round.thankYouUrl && isThankyouRound();
  if(round.twoPass) {
    // prefix + pass1(n) + interstitial(1) + pass2(n) + [thankyou] + end
    return prefix + n + 1 + n + (hasThankyou ? 1 : 0) + 1;
  }
  const hasAnswerKey = !round.showAnswers && !round.twoPass;
  return prefix + n + (hasAnswerKey ? 1 : 0) + (hasThankyou ? 1 : 0) + 1;
}

function slideType() {
  if(state.currentType === S_JUMP) return S_JUMP;
  const round = currentRound();
  const si = state.slideIndex;
  const prefix = isFirstRound() ? 3 : 1;

  // Fixed prefix slides
  if(si === 0) return S_INTRO;
  if(isFirstRound() && si === 1) return S_FOLLOWUS;
  if(isFirstRound() && si === 2) return S_RULES;

  if(round.type === 'slideshow') {
    const n = (round.slides||[]).length;
    if(si >= prefix && si < prefix + n) return S_SLIDE;
    return S_END;
  }

  const n = round.questions.length;
  const qStart = prefix; // questions start at index `prefix`
  const hasThankyou = !!round.thankYouUrl && isThankyouRound();

  if(round.twoPass) {
    if(si >= qStart && si < qStart + n) return S_QUESTION;         // pass 1
    if(si === qStart + n) return S_INTERSTITIAL;                    // between passes
    if(si > qStart + n && si <= qStart + 2*n) return S_QUESTION;   // pass 2
    if(hasThankyou && si === qStart + 2*n + 1) return S_THANKYOU;
    return S_END;
  }

  if(si >= qStart && si < qStart + n) return S_QUESTION;
  const hasAnswerKey = !round.showAnswers;
  if(hasAnswerKey && si === qStart + n) return S_ANSWERKEY;
  const afterAK = qStart + n + (hasAnswerKey ? 1 : 0);
  if(hasThankyou && si === afterAK) return S_THANKYOU;
  return S_END;
}

function questionInfo() {
  const round = currentRound();
  const n = round.questions.length;
  const prefix = isFirstRound() ? 3 : 1;
  const qStart = prefix;

  if(round.twoPass) {
    if(state.slideIndex >= qStart && state.slideIndex < qStart + n) {
      return { qIndex: state.slideIndex - qStart, isPass2: false };
    }
    if(state.slideIndex > qStart + n && state.slideIndex <= qStart + 2*n) {
      return { qIndex: state.slideIndex - qStart - n - 1, isPass2: true };
    }
  }
  return { qIndex: state.slideIndex - qStart, isPass2: false };
}

function currentQuestion() {
  const { qIndex } = questionInfo();
  return currentRound().questions[qIndex];
}

function advance() {
  const type = slideType();

  if(type === S_QUESTION && !state.answerVisible && !state.answerKeyVisible) {
    // Space = reveal answer
    return; // handled by keydown
  }

  state.answerVisible = false;
  state.answerKeyVisible = false;

  const max = slideCount() - 1;
  if(state.slideIndex < max) {
    state.slideIndex++;
    renderCurrentSlide();
  }
}

function goBack() {
  state.answerVisible = false;
  state.answerKeyVisible = false;
  if(state.slideIndex > 0) {
    state.slideIndex--;
    renderCurrentSlide();
  }
}

function jumpToMiniGame(miniRoundIndex) {
  if(state.jumpingFromMain) return;
  state.currentType = null;
  const mainRound = state.rounds[state.mainRoundIndex];
  mainRound.segmentStart = state.slideIndex;
  state.mainRoundSavedSlide = state.slideIndex;
  state.jumpingFromMain = true;
  state.answerVisible = false;
  state.roundIndex = miniRoundIndex;
  state.slideIndex = 0;
  renderCurrentSlide();
  updateJumpPanel();
}

function returnToMainRound() {
  state.currentType = null;
  state.roundIndex = state.mainRoundIndex;
  // Advance past the pause slide to the next one
  state.slideIndex = state.mainRoundSavedSlide + 1;
  state.jumpingFromMain = false;
  state.answerVisible = false;
  renderCurrentSlide();
  updateJumpPanel();
}

function updateJumpPanel() {
  const panel = document.getElementById('jump-panel');
  const type = slideType();
  const isMainRound = state.roundIndex === state.mainRoundIndex;
  const hasMainRound = state.mainRoundIndex >= 0;

  // Show jump panel only during main round question slides
  if(hasMainRound && isMainRound && type === S_QUESTION) {
    const miniRounds = state.rounds.map((r,i)=>({r,i})).filter(({i})=>i!==state.mainRoundIndex);
    if(miniRounds.length) {
      panel.classList.add('show');
      panel.innerHTML = `<div class="jump-panel-label">Jump to mini game</div>`
        + miniRounds.map(({r,i},mi) => `
          <button class="jump-btn" onclick="jumpToMiniGame(${i})">
            J+${mi+1} &nbsp;→&nbsp; ${r.title||r.tabName}
          </button>`).join('');
      return;
    }
  }
  panel.classList.remove('show');
  panel.innerHTML = '';
}

function goNextRound() {
  if(state.roundIndex < state.rounds.length - 1) {
    state.roundIndex++;
    state.slideIndex = 0;
    state.answerVisible = false;
    renderCurrentSlide();
  }
}

function showAnswerKey() {
  const n = currentRound().questions.length;
  state.slideIndex = n + 1;
  state.answerVisible = false;
  state.answerKeyVisible = true;
  renderCurrentSlide();
}

// ═══════════════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════════════
function renderCurrentSlide() {
  const round = currentRound();
  const type = slideType();

  // Background — keep existing simple logic, extend for new types
  const bg = document.getElementById('pres-bg');
  let bgUrl = '';
  if(type === S_INTRO) bgUrl = round.bgIntro || round.bgImage || '';
  else if(type === S_FOLLOWUS || type === S_RULES || type === S_INTERSTITIAL) bgUrl = round.bgPlain || round.bgQuestion || round.bgImage || '';
  else if(type === S_THANKYOU) bgUrl = round.thankYouUrl || '';
  else if(type === S_SLIDE) bgUrl = '';
  else bgUrl = round.bgQuestion || round.bgImage || '';

  if(bgUrl && type !== S_SLIDE && type !== S_THANKYOU) {
    bg.style.backgroundImage = `url('${bgUrl}')`;
    bg.classList.remove('no-img');
  } else if(!bgUrl || type === S_SLIDE) {
    bg.style.backgroundImage = '';
    bg.classList.add('no-img');
  }

  // HUD
  const n = round.type === 'slideshow' ? (round.slides||[]).length : round.questions.length;
  document.getElementById('hud-round').textContent = `${state.roundIndex+1}/${state.rounds.length}`;
  if(type === S_QUESTION) {
    const { qIndex, isPass2 } = questionInfo();
    document.getElementById('hud-q').textContent = `${qIndex+1}/${n}${round.twoPass?(isPass2?' ★':' ○'):''}`;
  } else if(type === S_SLIDE) {
    const prefix = isFirstRound() ? 3 : 1;
    document.getElementById('hud-q').textContent = `${state.slideIndex - prefix + 1}/${n}`;
  } else {
    document.getElementById('hud-q').textContent = '—';
  }

  // Render slide
  const container = document.getElementById('slide-container');
  container.innerHTML = '';

  if(type === S_INTRO) renderIntro(container, round);
  else if(type === S_FOLLOWUS) renderFollowUs(container, round);
  else if(type === S_RULES) renderRules(container, round);
  else if(type === S_QUESTION) renderQuestion(container, round);
  else if(type === S_INTERSTITIAL) renderInterstitial(container, round);
  else if(type === S_SLIDE) renderSlide(container, round);
  else if(type === S_ANSWERKEY) renderAnswerKey(container, round);
  else if(type === S_THANKYOU) renderThankyou(container, round);
  else renderEnd(container, round);

  updateJumpPanel();
}

function renderIntro(container, round) {
  // If there's a background image, show it fullscreen with no text overlay
  const bgUrl = round.bgIntro || round.bgImage;
  if(bgUrl) {
    const bg = document.getElementById('pres-bg');
    bg.style.backgroundImage = `url('${bgUrl}')`;
    bg.classList.remove('no-img');
    // Empty slide — just the background
    const el = document.createElement('div');
    el.style.cssText = 'position:absolute;inset:0;';
    container.appendChild(el);
    return;
  }
  // No image — show text intro
  const el = document.createElement('div');
  el.className = 'slide slide-intro active';
  const isSlideshow = round.type === 'slideshow';
  const countLabel = isSlideshow
    ? `${(round.slides||[]).length} slides`
    : `${round.questions.length} questions · difficulty sequenced`;
  el.innerHTML = `
    <div class="round-badge">Round ${state.roundIndex+1} of ${state.rounds.length}</div>
    <div class="round-title"><span>${round.title || round.tabName}</span></div>
    <div class="round-sub">${countLabel}</div>
    <div class="start-hint">Press → or Space to begin</div>
  `;
  container.appendChild(el);
}

function renderFollowUs(container, round) {
  const s = appSettings || {};
  const el = document.createElement('div');
  el.className = 'slide slide-intro active';
  el.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:3rem;text-align:center;';
  el.innerHTML = `
    <div style="font-family:var(--display);font-size:clamp(40px,7vw,90px);letter-spacing:.06em;background:var(--gold-shine);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1">
      FOLLOW US
    </div>
    <div style="display:flex;flex-direction:column;gap:.75rem;align-items:center">
      ${s.instagram ? `<div style="font-family:var(--cinzel);font-size:clamp(18px,2.5vw,32px);color:var(--text);letter-spacing:.08em">📸 ${s.instagram}</div>` : ''}
      ${s.tiktok ? `<div style="font-family:var(--cinzel);font-size:clamp(18px,2.5vw,32px);color:var(--text);letter-spacing:.08em">🎵 ${s.tiktok}</div>` : ''}
      ${s.website ? `<div style="font-family:var(--cinzel);font-size:clamp(14px,2vw,24px);color:var(--gold);letter-spacing:.06em">🌐 ${s.website}</div>` : ''}
    </div>
    ${s.qr ? `<img src="${s.qr}" style="width:clamp(100px,15vw,180px);height:auto;border-radius:12px;border:3px solid var(--gold-glow)">` : ''}
    ${s.tagline ? `<div style="font-family:var(--serif);font-style:italic;font-size:clamp(14px,1.8vw,22px);color:var(--text2);margin-top:.5rem">${s.tagline}</div>` : ''}
    <div style="font-family:var(--cinzel);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-top:1rem">Press → to continue</div>
  `;
  container.appendChild(el);
}

function renderRules(container, round) {
  // Find the rules for this round's category type
  const typeObj = (catTypes||[]).find(t => t.id === round.catType);
  const rulesText = typeObj?.rules || '';
  const typeName = typeObj?.name || round.title || '';

  const el = document.createElement('div');
  el.className = 'slide slide-intro active';
  el.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:3rem;text-align:center;';
  el.innerHTML = `
    <div style="font-family:var(--display);font-size:clamp(36px,6vw,80px);letter-spacing:.06em;background:var(--gold-shine);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1">
      HOW TO PLAY
    </div>
    ${typeName ? `<div style="font-family:var(--cinzel);font-size:clamp(13px,1.8vw,20px);letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem">${typeName}</div>` : ''}
    <div style="font-family:var(--serif);font-size:clamp(16px,2.2vw,28px);color:var(--text);line-height:1.6;max-width:800px;white-space:pre-line">${rulesText || 'Listen carefully to each question and write down your answers!'}</div>
    <div style="font-family:var(--cinzel);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-top:1rem">Press → to begin</div>
  `;
  container.appendChild(el);
}

function renderInterstitial(container, round) {
  const el = document.createElement('div');
  el.className = 'slide slide-end active';
  el.style.cssText = 'position:absolute;inset:0;';
  el.innerHTML = `
    <div class="end-label">Round ${state.roundIndex+1} — Pass 1 Complete</div>
    <div class="end-title" style="font-size:clamp(48px,8vw,110px)">Ready for<br><span style="background:var(--gold-shine);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">the Answers?</span></div>
    <div class="end-sub">We're going through every question again — this time with the answers revealed.</div>
    <div style="font-family:var(--cinzel);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-top:1.5rem;animation:pulse 2s ease-in-out infinite">Press → to continue</div>
  `;
  container.appendChild(el);
}

function renderThankyou(container, round) {
  const bg = document.getElementById('pres-bg');
  bg.style.background = '';
  bg.style.backgroundImage = '';
  bg.classList.remove('no-img');
  if(round.thankYouUrl) {
    bg.style.backgroundImage = `url('${round.thankYouUrl}')`;
  }
  const el = document.createElement('div');
  el.style.cssText = 'position:absolute;inset:0;';
  container.appendChild(el);
}

function renderSlide(container, round) {
  const slide = round.slides[state.slideIndex - 1];
  if(!slide) return;
  // Set pres-bg to black so nothing bleeds through
  const bg = document.getElementById('pres-bg');
  bg.style.backgroundImage = 'none';
  bg.style.background = '#000';
  bg.classList.remove('no-img');
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;inset:0;z-index:801;background-size:cover;background-position:center;background-repeat:no-repeat;background-color:#000;';
  el.style.backgroundImage = `url('${slide.url}')`;
  container.appendChild(el);
}

function renderQuestion(container, round) {
  const { qIndex, isPass2 } = questionInfo();
  const q = round.questions[qIndex];
  const n = round.questions.length;

  // Progress dots
  const dotsToShow = Math.min(n, 20);
  let dots = '';
  for(let i=0;i<dotsToShow;i++) {
    const cls = i < qIndex ? 'done' : i === qIndex ? 'current' : '';
    dots += `<div class="q-progress-dot ${cls}"></div>`;
  }

  // Pass indicator for twoPass mode
  const passLabel = round.twoPass && isPass2
    ? `<span style="color:var(--gold);font-size:8px;letter-spacing:.12em;display:block;margin-top:2px">ANSWERS PASS</span>`
    : '';

  // MC choices
  let optionsHtml = '';
  if(q.type === 'mc') {
    if(!q._choices) q._choices = buildMCChoices(q);
    const items = q._choices.map(c=>`
      <div class="mc-opt">
        <div class="mc-opt-letter">${c.label}</div>
        <div class="mc-opt-text">${c.text}</div>
      </div>`).join('');
    optionsHtml = `<div class="mc-grid">${items}</div>`;
  } else if(q.type === 'tf') {
    optionsHtml = `<div class="tf-row">
      <div class="tf-opt"><div class="tf-opt-text">TRUE</div></div>
      <div class="tf-opt"><div class="tf-opt-text">FALSE</div></div>
    </div>`;
  }

  // Image — hidden until loaded, removed on error (no flash)
  let imageHtml = '';
  if(q.imageUrl && q.imageUrl.trim()) {
    const src = driveViewUrl(q.imageUrl);
    const wrapId = `img-${qIndex}-${isPass2?'b':'a'}`;
    imageHtml = `<div class="q-image-wrap" id="${wrapId}" style="display:none">
      <img src="${src}"
        onload="var w=document.getElementById('${wrapId}');if(w)w.style.display='block'"
        onerror="var w=document.getElementById('${wrapId}');if(w)w.remove()"
        loading="eager"/>
    </div>`;
  }

  // Audio — only show if genuinely non-empty
  let audioHtml = '';
  if(q.audioUrl && q.audioUrl.trim().length > 0) {
    const src = driveViewUrl(q.audioUrl);
    audioHtml = `<button class="audio-btn" onclick="playAudio('${src}')">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      Click to play
    </button>`;
  }

  // Answer label
  let answerLabel = q.answer;
  if(q.type === 'mc') {
    if(!q._choices) q._choices = buildMCChoices(q);
    const correct = q._choices.find(c=>c.correct);
    if(correct) answerLabel = `${correct.label} — ${q.answer}`;
  }

  const answerOverlay = state.answerVisible ? `
    <div class="answer-overlay">
      <div class="answer-label">Answer</div>
      <div class="answer-text">${answerLabel}</div>
      <div class="answer-next-hint">Press Space or → for next</div>
    </div>` : '';

  const el = document.createElement('div');
  el.className = 'slide slide-question active';
  el.style.position = 'absolute';
  el.style.inset = '0';
  el.innerHTML = `
    <div class="q-header">
      <div class="q-num-badge">${String(qIndex+1).padStart(2,'0')}</div>
      <div class="q-round-label">
        ${round.tabName||round.title}${passLabel}
        <div class="q-progress">${dots}</div>
      </div>
    </div>
    <div class="q-body">
      ${imageHtml}
      <div class="q-text-block">
        <div class="q-question">${q.question}</div>
      </div>
      ${optionsHtml}
      ${audioHtml}
    </div>
    ${answerOverlay}
  `;
  container.appendChild(el);
}

function renderAnswerKey(container, round) {
  const items = round.questions.map((q,i)=>`
    <div class="ak-item">
      <div class="ak-num">${i+1}</div>
      <div class="ak-a">${q.answer}</div>
    </div>`).join('');

  const el = document.createElement('div');
  el.className = 'slide slide-answerkey active';
  el.style.position='absolute';el.style.inset='0';
  el.innerHTML = `
    <div class="ak-title">Answer Key</div>
    <div class="ak-grid">${items}</div>
  `;
  container.appendChild(el);
}

function renderEnd(container, round) {
  const isLastRound = state.roundIndex >= state.rounds.length - 1;
  const isMiniGame = state.jumpingFromMain;
  const el = document.createElement('div');
  el.className = 'slide slide-end active';
  el.style.position='absolute';el.style.inset='0';

  let btnHtml = '';
  if(isMiniGame) {
    const mainRound = state.rounds[state.mainRoundIndex];
    btnHtml = `<button class="end-btn end-btn-primary" onclick="returnToMainRound()">
      ← Return to ${mainRound.title||mainRound.tabName}
    </button>`;
  } else if(!isLastRound) {
    btnHtml = `<button class="end-btn end-btn-primary" onclick="goNextRound()">Start Round ${state.roundIndex+2} →</button>`;
  }

  el.innerHTML = `
    <div class="end-label">${round.tabName} Complete</div>
    <div class="end-title">${isMiniGame ? 'Mini Game<br>Done!' : isLastRound ? 'That\'s a<br>Wrap!' : 'Round<br>Done!'}</div>
    <div class="end-sub">${isMiniGame
      ? `Ready to head back?`
      : isLastRound
        ? 'Thanks for playing. Check the answer key before wrapping up.'
        : `Up next: Round ${state.roundIndex+2}`}</div>
    <div class="end-btn-row">
      <button class="end-btn end-btn-ghost" onclick="showAnswerKey()">View Answer Key</button>
      ${btnHtml}
    </div>
    ${isMiniGame ? `<div style="font-family:var(--cinzel);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-top:1rem;animation:pulse 2s ease-in-out infinite">Press → to return to main round</div>` :
      !isLastRound ? `<div style="font-family:var(--cinzel);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-top:1rem;animation:pulse 2s ease-in-out infinite">Press → to continue</div>` : ''}
  `;
  container.appendChild(el);
}

function renderJumpScreen() {
  // Clear any fixed slideshow overlay
  const container = document.getElementById('slide-container');
  container.innerHTML = '';
  // Reset pres-bg
  const bg = document.getElementById('pres-bg');
  bg.style.background = '';
  bg.style.backgroundImage = '';
  bg.classList.add('no-img');

  const miniRounds = state.rounds.map((r,i)=>({r,i})).filter(({i})=>i!==state.mainRoundIndex);
  const el = document.createElement('div');
  el.className = 'slide slide-end active';
  el.style.cssText = 'position:fixed;inset:0;z-index:820;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem;';
  el.innerHTML = `
    <div class="end-label">Main Round Paused</div>
    <div class="end-title">GAME<br><span style="background:var(--gold-shine);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">TIME!</span></div>
    <div class="end-sub">Choose a mini game to jump to</div>
    <div class="end-btn-row" style="margin-top:1.5rem">
      ${miniRounds.map(({r,i},mi)=>`
        <button class="end-btn end-btn-primary" style="pointer-events:all" onclick="doJump(${i})">
          ${r.title||r.tabName} →
        </button>`).join('')}
    </div>
    <div style="font-family:var(--cinzel);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-top:1rem">Press J+${miniRounds.map((_,mi)=>mi+1).join(' or J+')} to jump</div>
  `;
  container.appendChild(el);
  document.getElementById('jump-panel').classList.remove('show');
}

function doJump(i) {
  state.currentType = null;
  jumpToMiniGame(i);
}

// Pause points: fire when user presses → WHILE ON slides 5 or 7
// The slide plays, then pressing → shows GAME TIME (without advancing)
function shouldPauseForMiniGame(round) {
  if(!round.isMainRound || round.type !== 'slideshow' || state.mainRoundIndex < 0) return false;
  // Pause after 7th and 9th actual content slides
  // prefix=3 on round 1 (intro+followus+rules), prefix=1 otherwise
  const prefix = isFirstRound() ? 3 : 1;
  const pausePoints = new Set([prefix + 7, prefix + 9]);
  if(!pausePoints.has(state.slideIndex)) return false;
  state.currentType = S_JUMP;
  return true;
}

function advanceSlide() {
  const type = slideType();
  if(type === S_JUMP) return;

  // Simple advance types
  if(type === S_INTRO || type === S_FOLLOWUS || type === S_RULES ||
     type === S_INTERSTITIAL || type === S_THANKYOU || type === S_ANSWERKEY) {
    const max = slideCount() - 1;
    if(state.slideIndex < max) { state.slideIndex++; state.answerVisible=false; renderCurrentSlide(); }
    return;
  }

  if(type === S_SLIDE) {
    const round = currentRound();
    if(shouldPauseForMiniGame(round)) { renderJumpScreen(); return; }
    const max = slideCount() - 1;
    if(state.slideIndex < max) { state.slideIndex++; state.answerVisible=false; renderCurrentSlide(); }
    return;
  }

  if(type === S_QUESTION) {
    const round = currentRound();
    const { isPass2 } = questionInfo();
    const shouldReveal = (round.twoPass && isPass2) || (!round.twoPass && round.showAnswers !== false);
    if(shouldReveal && !state.answerVisible) {
      state.answerVisible = true; renderCurrentSlide();
    } else {
      state.answerVisible = false;
      const max = slideCount() - 1;
      if(state.slideIndex < max) { state.slideIndex++; renderCurrentSlide(); }
    }
    return;
  }

  if(type === S_END) {
    if(state.jumpingFromMain) returnToMainRound();
    else if(state.roundIndex < state.rounds.length - 1) goNextRound();
  }
}

function retreatSlide() {
  if(slideType() === S_JUMP) return;
  state.answerVisible = false;
  state.currentType = null;
  if(state.slideIndex > 0) { state.slideIndex--; renderCurrentSlide(); }
}

document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT') return;
  if(!document.getElementById('pres-screen').classList.contains('show')) return;

  if(e.key === 'Escape') { exitPresentation(); return; }

  // Forward: Space, →, Enter, PageDown (clicker)
  if(e.key === ' ' || e.code === 'Space' || e.key === 'ArrowRight' || e.key === 'Enter' || e.key === 'PageDown') {
    e.preventDefault(); advanceSlide(); return;
  }

  // Back: ←, PageUp (clicker)
  if(e.key === 'ArrowLeft' || e.key === 'PageUp') {
    e.preventDefault(); retreatSlide(); return;
  }

  // J+number = jump to mini game
  if((e.key === 'j' || e.key === 'J') && state.mainRoundIndex >= 0 && state.roundIndex === state.mainRoundIndex) {
    state._jumpPending = true;
    setTimeout(()=>{ state._jumpPending = false; }, 1500);
    return;
  }
  if(state._jumpPending && e.key >= '1' && e.key <= '9') {
    state._jumpPending = false;
    const miniRounds = state.rounds.map((_,i)=>i).filter(i=>i!==state.mainRoundIndex);
    const idx = parseInt(e.key) - 1;
    if(miniRounds[idx] !== undefined) doJump(miniRounds[idx]);
    return;
  }
});

// Click anywhere on presentation = advance (mouse / clicker click)
document.getElementById('pres-screen').addEventListener('click', e => {
  if(e.target.closest('button')) return;
  if(!document.getElementById('pres-screen').classList.contains('show')) return;
  advanceSlide();
});

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function driveViewUrl(url) {
  if(!url) return url;
  const fm = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(fm) return `https://drive.google.com/thumbnail?id=${fm[1]}&sz=w800`;
  const fm2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(fm2) return `https://drive.google.com/thumbnail?id=${fm2[1]}&sz=w800`;
  return url;
}

function playAudio(src) {
  const audio = document.getElementById('audio-player');
  audio.src = src;
  audio.play().catch(()=>toast('Audio blocked — click again'));
}

function exitPresentation() {
  document.getElementById('pres-screen').classList.remove('show');
  document.getElementById('hud').classList.remove('show');
  document.getElementById('fullscreen-btn').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  if(state.rounds.length > 0) {
    document.getElementById('setup-return-btn').style.display = 'block';
  }
  document.exitFullscreen?.().catch(()=>{});
  state.answerVisible = false;
}

function returnToPresentation() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('pres-screen').classList.add('show');
  document.getElementById('hud').classList.add('show');
  document.getElementById('fullscreen-btn').style.display = 'block';
  document.documentElement.requestFullscreen?.().catch(()=>{});
}

function shuffle(arr) {
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function safe(v) { return (v==null)?'':String(v); }

function showLoading(msg) {
  document.getElementById('loading-screen').classList.add('show');
  document.getElementById('loading-label').textContent = msg||'Loading…';
}
function setLoadingLabel(msg) { document.getElementById('loading-label').textContent = msg; }
function hideLoading() { document.getElementById('loading-screen').classList.remove('show'); }

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ═══════════════════════════════════════════════════════
//  INIT — read URL params, show round cards, wait for Launch click
// ═══════════════════════════════════════════════════════
let pendingRounds = [];

function checkUrlParams() {
  const p = new URLSearchParams(window.location.search);
  if(!p.get('rounds')) return false;

  const roundCount = parseInt(p.get('rounds'))||1;
  const rounds = [];
  for(let i=0;i<roundCount;i++) {
    const url = p.get(`r${i}_url`);
    const tab = p.get(`r${i}_tab`);
    const qCount = parseInt(p.get(`r${i}_qcount`))||20;
    if(url !== null || p.get(`r${i}_folder`)) rounds.push({
      sheetUrl:url||'', tabName:tab||'',
      type: p.get(`r${i}_type`)||'trivia',
      folderUrl: p.get(`r${i}_folder`)||'',
      bgImage:p.get(`r${i}_bg`)||'',
      bgIntro:p.get(`r${i}_bgIntro`)||p.get(`r${i}_bg`)||'',
      bgQuestion:p.get(`r${i}_bgQuestion`)||p.get(`r${i}_bg`)||'',
      bgPlain:p.get(`r${i}_bgPlain`)||'',
      thankYouUrl:p.get(`r${i}_thankYou`)||'',
      catType:p.get(`r${i}_catType`)||'',
      title:p.get(`r${i}_name`)||`Round ${i+1}`,
      questionCount:qCount,
      showAnswers: p.get(`r${i}_showAnswers`) !== '0',
      twoPass: p.get(`r${i}_twoPass`) === '1',
      isMainRound: p.get(`r${i}_isMainRound`) === '1',
      segmentSize: parseInt(p.get(`r${i}_segmentSize`))||5,
      segmentStart: 0, // which slide index the current segment started at
      slides:[] // for slideshow type
    });
  }
  if(!rounds.length) return false;

  pendingRounds = rounds;

  // Render round cards
  const grid = document.getElementById('setup-rounds-grid');
  grid.innerHTML = rounds.map((r,i) => {
    const thumb = r.bgIntro || r.bgImage;
    const imgHtml = thumb
      ? `<img class="setup-round-card-thumb" src="${thumb}" onerror="this.outerHTML='<div class=setup-round-card-thumb-placeholder></div>'">`
      : `<div class="setup-round-card-thumb-placeholder"></div>`;
    const isSlideshow = r.type === 'slideshow';
    const hasError = r.loadError;
    return `<div class="setup-round-card" style="${hasError ? 'border-color:var(--red);opacity:.7' : ''}">
      ${imgHtml}
      <div class="setup-round-card-body">
        <div class="setup-round-num">Round ${i+1}${isSlideshow ? ' · 🖼' : ''}${hasError ? ' · ⚠' : ''}</div>
        <div class="setup-round-name">${r.title}</div>
        <div class="setup-round-tab">${hasError ? r.loadError : isSlideshow ? 'Image slideshow' : r.tabName}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('setup-sub-text').textContent = `${rounds.length} round${rounds.length>1?'s':''} ready to go.`;
  document.getElementById('setup-launch-btn').style.display = 'block';
  return true;
}

async function launchFromSetup() {
  if(!pendingRounds.length) return;

  state.rounds = pendingRounds.map(r=>({...r, questions:[], slides:[]}));
  document.getElementById('setup-screen').style.display = 'none';
  showLoading('Loading questions…');

  for(let i=0;i<state.rounds.length;i++) {
    const round = state.rounds[i];
    setLoadingLabel(`Loading Round ${i+1}: ${round.title}…`);
    try {
      if(round.type === 'slideshow') {
        round.slides = loadSlidesheetManifest(round.folderUrl);
        round.questions = [];
      } else {
        round.questions = await loadSheetQuestions(
          round.sheetUrl, round.tabName, round.questionCount
        );
      }
    } catch(e) {
      console.error('Round load failed:', e);
      round.loadError = e.message;
      round.questions = [];
      round.slides = [];
    }
  }

  // Don't filter out failed rounds — keep them so the index stays correct
  // Just warn about any that failed
  const failed = state.rounds.filter(r => r.loadError);
  if(failed.length) {
    console.warn('Failed rounds:', failed.map(r => r.title + ': ' + r.loadError));
  }

  // Only remove rounds that have absolutely nothing AND no error to report
  state.rounds = state.rounds.filter(r => {
    if(r.type === 'slideshow') return (r.slides||[]).length > 0 || r.loadError;
    return r.questions.length > 0 || r.loadError;
  });

  hideLoading();

  // Re-render round cards to show any load errors
  const grid = document.getElementById('setup-rounds-grid');
  if(grid) {
    grid.innerHTML = state.rounds.map((r,i) => {
      const thumb = r.bgIntro || r.bgImage;
      const imgHtml = thumb
        ? `<img class="setup-round-card-thumb" src="${thumb}" onerror="this.style.display='none'">`
        : `<div class="setup-round-card-thumb-placeholder"></div>`;
      const isSlideshow = r.type === 'slideshow';
      const hasError = r.loadError;
      return `<div class="setup-round-card" style="${hasError ? 'border-color:var(--red);opacity:.7' : ''}">
        ${imgHtml}
        <div class="setup-round-card-body">
          <div class="setup-round-num">Round ${i+1}${isSlideshow ? ' · 🖼' : ''}${hasError ? ' · ⚠' : ''}</div>
          <div class="setup-round-name">${r.title}</div>
          <div class="setup-round-tab" style="${hasError?'color:var(--red)':''}">${hasError ? r.loadError : isSlideshow ? (r.slides.length + ' slides loaded') : (r.questions.length + ' questions loaded')}</div>
        </div>
      </div>`;
    }).join('');
  }

  if(!state.rounds.filter(r => !r.loadError).length) {
    document.getElementById('setup-screen').style.display = 'flex';
    toast('All rounds failed to load. Check your settings.');
    return;
  }

  // Detect main round
  state.mainRoundIndex = state.rounds.findIndex(r=>r.isMainRound);

  // Start from main round if there is one, otherwise start from 0
  state.roundIndex = state.mainRoundIndex >= 0 ? state.mainRoundIndex : 0;
  state.slideIndex = 0;

  // Show return button for future use
  document.getElementById('setup-return-btn').style.display = 'block';

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('pres-screen').classList.add('show');
  document.getElementById('hud').classList.add('show');
  document.getElementById('fullscreen-btn').style.display = 'block';
  renderCurrentSlide();
  document.documentElement.requestFullscreen?.().catch(()=>{});
}

// Double-click setup screen = re-enter fullscreen if we have rounds loaded
document.getElementById('setup-screen').addEventListener('dblclick', () => {
  if(state.rounds.length > 0) returnToPresentation();
});

checkUrlParams();
</script>
