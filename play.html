<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#080808"/>
<title>Belladonna Trivia — Play</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold2:#e8c96a;--gold3:#f5df90;
  --gold-shine:linear-gradient(135deg,#c9a84c 0%,#f5df90 45%,#c9a84c 70%,#e2b84a 100%);
  --bg:#080808;--surface:rgba(18,16,12,.95);--surface2:rgba(25,22,16,.98);
  --text:#f0ede8;--text2:#b0a898;--text3:#5a5248;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --green:#2ecc71;--red:#e74c3c;--blue:#3498db;
  --radius:12px;--radius-lg:18px;
  --display:'Bebas Neue',sans-serif;
  --cinzel:'Cinzel',serif;
  --serif:'EB Garamond',serif;
  --font:'DM Sans',sans-serif;
  /* Answer button colors */
  --c1:#c0392b;--c2:#2980b9;--c3:#27ae60;--c4:#8e44ad;
}
html,body{
  height:100%;width:100%;
  font-family:var(--font);
  background:var(--bg);color:var(--text);
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* ── SCREENS ── */
.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.5rem;
  transition:opacity .3s ease;
}
.screen.hidden{opacity:0;pointer-events:none}

/* ── REGISTER SCREEN ── */
#reg-screen{
  background:var(--bg);
  gap:1.5rem;
  text-align:center;
}
.reg-logo{
  font-family:var(--cinzel);font-size:11px;letter-spacing:.25em;
  color:var(--gold);text-transform:uppercase;margin-bottom:.5rem;
}
.reg-title{
  font-family:var(--display);font-size:clamp(48px,12vw,72px);
  line-height:.9;letter-spacing:.04em;color:var(--text);
}
.reg-title span{color:var(--gold)}
.reg-sub{
  font-family:var(--serif);font-style:italic;font-size:16px;
  color:var(--text2);margin-top:.25rem;
}
.reg-input{
  width:100%;max-width:360px;
  padding:16px 18px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  color:var(--text);font-family:var(--font);font-size:16px;
  outline:none;text-align:center;
  transition:border-color .2s;
}
.reg-input:focus{border-color:var(--gold)}
.reg-input::placeholder{color:var(--text3)}
.reg-btn{
  width:100%;max-width:360px;
  padding:16px;
  background:var(--gold-shine);
  border:none;border-radius:var(--radius);
  color:#000;font-family:var(--cinzel);font-size:13px;
  font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  cursor:pointer;
  transition:opacity .15s;
}
.reg-btn:active{opacity:.8}
.reg-btn:disabled{opacity:.4;cursor:not-allowed}
.reg-hint{
  font-size:12px;color:var(--text3);
  font-family:var(--serif);font-style:italic;
}

/* ── WAIT SCREEN ── */
#wait-screen{
  background:var(--bg);gap:1rem;text-align:center;
}
.wait-pulse{
  width:48px;height:48px;border-radius:50%;
  border:2px solid var(--gold);
  border-top-color:transparent;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.wait-name{
  font-family:var(--cinzel);font-size:14px;letter-spacing:.12em;
  color:var(--gold);text-transform:uppercase;
}
.wait-msg{font-family:var(--serif);font-style:italic;color:var(--text2);font-size:16px}
.wait-score-wrap{
  margin-top:1rem;
  background:rgba(201,168,76,.08);
  border:1px solid rgba(201,168,76,.2);
  border-radius:var(--radius);
  padding:12px 24px;
  text-align:center;
}
.wait-score-label{font-size:11px;letter-spacing:.15em;color:var(--text3);text-transform:uppercase;margin-bottom:4px}
.wait-score-val{font-family:var(--display);font-size:48px;color:var(--gold);line-height:1}

/* ── QUESTION SCREEN ── */
#q-screen{
  background:var(--bg);
  gap:0;
  justify-content:flex-start;
  padding:0;
  overflow:hidden;
}
.q-top{
  width:100%;padding:1rem 1.25rem .75rem;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.q-team-name{
  font-family:var(--cinzel);font-size:11px;letter-spacing:.12em;
  color:var(--gold);text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:50%;
}
.q-score-badge{
  font-family:var(--display);font-size:22px;color:var(--gold);
  white-space:nowrap;
}
.q-progress-bar-wrap{
  width:100%;height:5px;background:rgba(255,255,255,.06);flex-shrink:0;
}
.q-progress-bar{
  height:100%;background:var(--gold);
  transition:width .3s ease;
}
.q-body{
  flex:1;width:100%;
  display:flex;flex-direction:column;
  padding:1rem 1.25rem;
  gap:.75rem;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.q-num{
  font-family:var(--cinzel);font-size:10px;letter-spacing:.18em;
  color:var(--text3);text-transform:uppercase;
}
.q-text{
  font-family:var(--cinzel);font-weight:600;
  font-size:clamp(17px,4.5vw,22px);
  line-height:1.35;color:var(--text);
}
.q-choices{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;width:100%;margin-top:.25rem;
}
.choice-btn{
  padding:14px 10px;
  border:none;border-radius:var(--radius);
  color:#fff;font-family:var(--font);font-size:14px;font-weight:500;
  cursor:pointer;text-align:center;line-height:1.3;
  transition:transform .1s,opacity .15s;
  min-height:60px;
}
.choice-btn:active{transform:scale(.96)}
.choice-btn.c1{background:var(--c1)}
.choice-btn.c2{background:var(--c2)}
.choice-btn.c3{background:var(--c3)}
.choice-btn.c4{background:var(--c4)}
.choice-btn.selected{
  outline:3px solid #fff;
  outline-offset:2px;
}
.choice-btn.correct-reveal{background:var(--green) !important;outline:3px solid #fff;outline-offset:2px}
.choice-btn.wrong-reveal{opacity:.4}
.choice-btn:disabled{cursor:not-allowed}

/* TF buttons */
.tf-choices{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;width:100%;margin-top:.25rem;
}
.tf-btn{
  padding:20px 10px;
  border:none;border-radius:var(--radius);
  color:#fff;font-family:var(--display);font-size:32px;letter-spacing:.04em;
  cursor:pointer;
  transition:transform .1s,opacity .15s;
}
.tf-btn:active{transform:scale(.96)}
.tf-btn.t{background:var(--c3)}
.tf-btn.f{background:var(--c1)}
.tf-btn.selected{outline:3px solid #fff;outline-offset:2px}
.tf-btn:disabled{cursor:not-allowed}

/* Open answer */
.open-wrap{
  display:flex;flex-direction:column;gap:10px;width:100%;margin-top:.25rem;
}
.open-input{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  color:var(--text);font-family:var(--font);font-size:16px;
  outline:none;
  transition:border-color .2s;
}
.open-input:focus{border-color:var(--gold)}
.open-input:disabled{opacity:.5}
.open-submit{
  padding:14px;
  background:var(--gold-shine);
  border:none;border-radius:var(--radius);
  color:#000;font-family:var(--cinzel);font-size:12px;
  font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  cursor:pointer;
  transition:opacity .15s;
}
.open-submit:disabled{opacity:.35;cursor:not-allowed}

/* Timer bar */
.timer-bar-wrap{
  width:100%;height:6px;
  background:rgba(255,255,255,.06);
  flex-shrink:0;
  overflow:hidden;
}
.timer-bar{
  height:100%;
  background:linear-gradient(90deg,var(--red),var(--gold));
  transition:width linear;
  width:100%;
}

/* Submitted state */
.submitted-msg{
  text-align:center;padding:1.5rem;
  font-family:var(--serif);font-style:italic;
  color:var(--text2);font-size:17px;
}
.submitted-check{
  font-size:48px;display:block;margin-bottom:.5rem;
}

/* ── CLOSED / LOCKED STATE ── */
.locked-bar{
  width:100%;padding:10px;
  background:rgba(231,76,60,.15);
  border-top:1px solid rgba(231,76,60,.3);
  text-align:center;
  font-family:var(--cinzel);font-size:10px;letter-spacing:.15em;
  color:var(--red);text-transform:uppercase;
  flex-shrink:0;
}

/* ── LEADERBOARD SCREEN ── */
#lb-screen{
  background:var(--bg);gap:1rem;
  overflow-y:auto;
  justify-content:flex-start;
  padding-top:3rem;
}
.lb-title{
  font-family:var(--display);font-size:clamp(36px,10vw,52px);
  letter-spacing:.06em;color:var(--gold);text-align:center;
}
.lb-list{width:100%;max-width:480px;display:flex;flex-direction:column;gap:8px}
.lb-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:var(--radius);
}
.lb-rank{
  font-family:var(--display);font-size:28px;
  color:var(--text3);min-width:32px;text-align:center;
}
.lb-rank.top{color:var(--gold)}
.lb-name{flex:1;font-family:var(--cinzel);font-size:13px;letter-spacing:.08em;color:var(--text)}
.lb-pts{font-family:var(--display);font-size:28px;color:var(--gold)}
.lb-you{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.06)}
</style>
</head>
<body>

<!-- ── REGISTER ── -->
<div class="screen" id="reg-screen">
  <div class="reg-logo">Belladonna Audio Alchemies</div>
  <div class="reg-title">TRIVIA<br><span>NIGHT</span></div>
  <div class="reg-sub">Enter your name to join the game</div>
  <input class="reg-input" id="reg-input" type="text" placeholder="Name or Team Name" maxlength="32" autocomplete="off" autocorrect="off" spellcheck="false"/>
  <button class="reg-btn" id="reg-btn" onclick="register()">Join Game</button>
  <div class="reg-hint" id="reg-status">Waiting for game to start…</div>
</div>

<!-- ── WAITING ── -->
<div class="screen hidden" id="wait-screen">
  <div class="wait-pulse"></div>
  <div class="wait-name" id="wait-name"></div>
  <div class="wait-msg">Waiting for the next question…</div>
  <div class="wait-score-wrap">
    <div class="wait-score-label">Your Score</div>
    <div class="wait-score-val" id="wait-score">0</div>
  </div>
</div>

<!-- ── QUESTION ── -->
<div class="screen hidden" id="q-screen">
  <div class="q-top">
    <div class="q-team-name" id="q-team-name"></div>
    <div class="q-score-badge" id="q-score-badge">0 pts</div>
  </div>
  <div class="q-progress-bar-wrap">
    <div class="q-progress-bar" id="q-progress-bar" style="width:100%"></div>
  </div>
  <div class="timer-bar-wrap" id="timer-bar-wrap" style="display:none">
    <div class="timer-bar" id="timer-bar"></div>
  </div>
  <div class="q-body" id="q-body"></div>
  <div class="locked-bar" id="locked-bar" style="display:none">Answers closed</div>
</div>

<!-- ── LEADERBOARD ── -->
<div class="screen hidden" id="lb-screen">
  <div class="lb-title">LEADERBOARD</div>
  <div class="lb-list" id="lb-list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
// ═══════════════════════════════════════════════
//  FIREBASE
// ═══════════════════════════════════════════════
const cfg = {
  apiKey:"AIzaSyBHZekpX2HQOjI94EYJPSJS9Kew4gpTM0w",
  authDomain:"belladonnatrivia.firebaseapp.com",
  databaseURL:"https://belladonnatrivia-default-rtdb.firebaseio.com",
  projectId:"belladonnatrivia"
};
if(!firebase.apps.length) firebase.initializeApp(cfg);
const db = firebase.database();

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let teamId = localStorage.getItem('bella_team_id') || null;
let teamName = localStorage.getItem('bella_team_name') || null;
let myScore = 0;
let currentQ = null;
let answered = false;
let timerInterval = null;
let timerStart = null;

// ═══════════════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ═══════════════════════════════════════════════
//  REGISTER
// ═══════════════════════════════════════════════
async function register() {
  const name = document.getElementById('reg-input').value.trim();
  if(!name) return;

  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.textContent = 'Joining…';

  // Check if game is active
  const gameSnap = await db.ref('liveGame/status').once('value');
  const status = gameSnap.val();

  // Generate or reuse team ID
  if(!teamId) {
    teamId = 'team_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    localStorage.setItem('bella_team_id', teamId);
  }
  teamName = name;
  localStorage.setItem('bella_team_name', name);

  // Register in Firebase
  await db.ref(`liveGame/teams/${teamId}`).set({
    name,
    score: 0,
    joinedAt: Date.now(),
  });

  // Get existing score if rejoining
  const scoreSnap = await db.ref(`liveGame/teams/${teamId}/score`).once('value');
  myScore = scoreSnap.val() || 0;

  showWait();
  startListening();
}

// ═══════════════════════════════════════════════
//  WAIT
// ═══════════════════════════════════════════════
function showWait() {
  document.getElementById('wait-name').textContent = teamName;
  document.getElementById('wait-score').textContent = myScore;
  showScreen('wait-screen');
}

// ═══════════════════════════════════════════════
//  FIREBASE LISTENERS
// ═══════════════════════════════════════════════
function startListening() {
  // Listen for game state changes
  db.ref('liveGame').on('value', snap => {
    const game = snap.val();
    if(!game) return;

    // Update score from Firebase (source of truth)
    if(game.teams && game.teams[teamId]) {
      myScore = game.teams[teamId].score || 0;
      document.getElementById('wait-score').textContent = myScore;
      document.getElementById('q-score-badge').textContent = myScore + ' pts';
    }

    // Leaderboard visibility
    if(game.leaderboardVisible && game.status !== 'question') {
      renderLeaderboard(game.teams || {});
      showScreen('lb-screen');
      return;
    }

    switch(game.status) {
      case 'question':
        if(!game.currentQuestion) break;
        const q = game.currentQuestion;
        // Only re-render if it's a new question
        if(!currentQ || currentQ.id !== q.id) {
          currentQ = q;
          answered = false;
          renderQuestion(q);
        }
        break;
      case 'closed':
        lockAnswers();
        break;
      case 'waiting':
        showWait();
        clearTimer();
        break;
    }
  });
}

// ═══════════════════════════════════════════════
//  RENDER QUESTION
// ═══════════════════════════════════════════════
function renderQuestion(q) {
  showScreen('q-screen');
  document.getElementById('q-team-name').textContent = teamName;
  document.getElementById('q-score-badge').textContent = myScore + ' pts';
  document.getElementById('locked-bar').style.display = 'none';

  const body = document.getElementById('q-body');
  body.innerHTML = '';

  // Question number
  const numEl = document.createElement('div');
  numEl.className = 'q-num';
  numEl.textContent = `Question ${q.index + 1}`;
  body.appendChild(numEl);

  // Question text
  const textEl = document.createElement('div');
  textEl.className = 'q-text';
  textEl.textContent = q.text;
  body.appendChild(textEl);

  // Answer input based on type
  if(q.type === 'mc' && q.choices) {
    const colors = ['c1','c2','c3','c4'];
    const grid = document.createElement('div');
    grid.className = 'q-choices';
    q.choices.forEach((choice, i) => {
      const btn = document.createElement('button');
      btn.className = `choice-btn ${colors[i] || 'c1'}`;
      btn.textContent = choice;
      btn.onclick = () => submitAnswer(choice, btn, 'mc');
      grid.appendChild(btn);
    });
    body.appendChild(grid);
  } else if(q.type === 'tf') {
    const grid = document.createElement('div');
    grid.className = 'tf-choices';
    ['True','False'].forEach(val => {
      const btn = document.createElement('button');
      btn.className = `tf-btn ${val === 'True' ? 't' : 'f'}`;
      btn.textContent = val.toUpperCase();
      btn.onclick = () => submitAnswer(val, btn, 'tf');
      grid.appendChild(btn);
    });
    body.appendChild(grid);
  } else {
    // Open answer
    const wrap = document.createElement('div');
    wrap.className = 'open-wrap';
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'open-input';
    input.id = 'open-answer-input';
    input.placeholder = 'Type your answer…';
    input.autocomplete = 'off';
    input.autocorrect = 'off';
    input.spellcheck = false;
    const submitBtn = document.createElement('button');
    submitBtn.className = 'open-submit';
    submitBtn.textContent = 'Submit Answer';
    submitBtn.onclick = () => {
      const val = input.value.trim();
      if(val) submitAnswer(val, submitBtn, 'open');
    };
    // Submit on enter
    input.addEventListener('keydown', e => {
      if(e.key === 'Enter') submitBtn.click();
    });
    wrap.appendChild(input);
    wrap.appendChild(submitBtn);
    body.appendChild(wrap);
  }

  // Timer
  const timerWrap = document.getElementById('timer-bar-wrap');
  const timerBar = document.getElementById('timer-bar');
  clearTimer();

  if(q.timed) {
    timerWrap.style.display = 'block';
    timerBar.style.transition = 'none';
    timerBar.style.width = '100%';
    const duration = (q.timeLimit || 10) * 1000;
    timerStart = Date.now();
    requestAnimationFrame(() => {
      timerBar.style.transition = `width ${duration}ms linear`;
      timerBar.style.width = '0%';
    });
    timerInterval = setTimeout(() => {
      lockAnswers();
      if(!answered) submitAnswer(null, null, 'timeout');
    }, duration);
  } else {
    timerWrap.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════
//  SUBMIT ANSWER
// ═══════════════════════════════════════════════
async function submitAnswer(value, btn, type) {
  if(answered) return;
  answered = true;
  clearTimer();

  const elapsed = timerStart ? (Date.now() - timerStart) / 1000 : null;

  // Disable all inputs
  lockInputs();

  // Show selected state
  if(btn) btn.classList.add('selected');

  // Show submitted message for open answers
  if(type === 'open') {
    const body = document.getElementById('q-body');
    const msg = document.createElement('div');
    msg.className = 'submitted-msg';
    msg.innerHTML = `<span class="submitted-check">✓</span>Answer submitted`;
    body.appendChild(msg);
  }

  // Write to Firebase
  if(value !== null) {
    await db.ref(`liveGame/answers/${currentQ.id}/${teamId}`).set({
      answer: value,
      timestamp: Date.now(),
      elapsed: elapsed,
      teamName: teamName,
      status: 'pending',
    });
  }
}

// ═══════════════════════════════════════════════
//  LOCK ANSWERS
// ═══════════════════════════════════════════════
function lockAnswers() {
  clearTimer();
  lockInputs();
  document.getElementById('locked-bar').style.display = 'block';
}

function lockInputs() {
  document.querySelectorAll('.choice-btn, .tf-btn, .open-submit, .open-input')
    .forEach(el => el.disabled = true);
}

function clearTimer() {
  if(timerInterval) { clearTimeout(timerInterval); timerInterval = null; }
  timerStart = null;
  const bar = document.getElementById('timer-bar');
  if(bar) { bar.style.transition = 'none'; bar.style.width = '0%'; }
}

// ═══════════════════════════════════════════════
//  LEADERBOARD
// ═══════════════════════════════════════════════
function renderLeaderboard(teams) {
  const sorted = Object.entries(teams)
    .map(([id, t]) => ({id, name: t.name, score: t.score || 0}))
    .sort((a,b) => b.score - a.score);

  const list = document.getElementById('lb-list');
  list.innerHTML = sorted.map((t, i) => `
    <div class="lb-item ${t.id === teamId ? 'lb-you' : ''}">
      <div class="lb-rank ${i < 3 ? 'top' : ''}">${i+1}</div>
      <div class="lb-name">${t.name}${t.id === teamId ? ' ← you' : ''}</div>
      <div class="lb-pts">${t.score}</div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
// If returning player, skip registration
window.addEventListener('DOMContentLoaded', async () => {
  if(teamId && teamName) {
    document.getElementById('reg-input').value = teamName;
    // Check if game exists and rejoin
    const snap = await db.ref('liveGame/status').once('value');
    if(snap.val()) {
      // Rejoin silently
      document.getElementById('reg-btn').disabled = true;
      await db.ref(`liveGame/teams/${teamId}/name`).set(teamName);
      const scoreSnap = await db.ref(`liveGame/teams/${teamId}/score`).once('value');
      myScore = scoreSnap.val() || 0;
      showWait();
      startListening();
      return;
    }
  }
  // Fresh start — show register screen
  document.getElementById('reg-status').textContent = 'Enter your name to join the game';
  document.getElementById('reg-input').addEventListener('keydown', e => {
    if(e.key === 'Enter') register();
  });
});
</script>
</body>
</html>
